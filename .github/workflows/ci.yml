name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run flake8 linter
        working-directory: backend
        run: |
          flake8 app/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=app/migrations,__pycache__

      - name: Run pytest with coverage
        working-directory: backend
        env:
          MONGODB_URL: ${{ secrets.MONGODB_URL || 'mongodb://localhost:27017' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-key' }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY || 'test-key' }}
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'test-secret-key-for-ci-only' }}
          TESTING: "true"
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend
          name: PS-Fitness-Backend

  frontend-ci:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build production bundle
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:8000
          CI: false  # Treat warnings as warnings, not errors
        run: npm run build
